<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>67 Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rubik:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--ink:#f0ece2;--accent:#c8392b}
html,body{width:100%;height:100%;background:var(--bg);color:var(--ink);font-family:'Rubik',sans-serif;overflow:hidden}
#grid{position:fixed;inset:0;background-image:linear-gradient(to right,rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(to bottom,rgba(255,255,255,.025) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
#stripe{position:fixed;top:-20%;left:60%;width:2px;height:200%;background:linear-gradient(to bottom,transparent,rgba(200,57,43,.18) 40%,transparent);transform:rotate(-12deg);pointer-events:none}
/* scoreboard */
#scoreboard{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:3rem;padding:.9rem 2rem;border-bottom:1px solid rgba(200,57,43,.2);background:rgba(10,10,10,.85);backdrop-filter:blur(8px);z-index:90}
.sb-label{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(240,236,226,.35);margin-bottom:.3rem;text-align:center}
#my-score{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--ink);line-height:1;transition:transform .15s,color .15s;text-align:center}
#best-score{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--accent);line-height:1;text-align:center}
.sb-div{width:1px;height:40px;background:rgba(200,57,43,.25);flex-shrink:0}
/* lb side button */
#lb-btn{position:fixed;top:50%;transform:translateY(-50%);left:1.4rem;z-index:91;background:none;border:1px solid rgba(200,57,43,.35);color:rgba(240,236,226,.55);font-family:'Rubik',sans-serif;font-size:.62rem;letter-spacing:.25em;text-transform:uppercase;padding:.65rem .5rem;cursor:pointer;writing-mode:vertical-rl;transition:border-color .2s,color .2s,background .2s}
#lb-btn:hover{border-color:var(--accent);color:var(--ink);background:rgba(200,57,43,.1)}
/* main scene */
#scene{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;position:relative}
.scene-label{font-weight:300;font-size:.75rem;letter-spacing:.35em;text-transform:uppercase;color:rgba(240,236,226,.35);margin-bottom:2.5rem;animation:fadeIn 1.2s ease both}
/* button */
#btn{position:relative;font-family:'Bebas Neue',sans-serif;font-size:clamp(5rem,18vw,13rem);letter-spacing:-.02em;color:var(--ink);background:none;border:none;cursor:pointer;line-height:1;padding:.15em .5em;isolation:isolate;animation:slideUp .9s cubic-bezier(.16,1,.3,1) both}
#btn::before{content:'';position:absolute;inset:0;border:2px solid var(--accent);transform:translate(6px,6px);transition:transform .15s;z-index:-1}
#btn::after{content:'';position:absolute;inset:0;background:var(--accent);transform:scaleX(0);transform-origin:right;transition:transform .25s cubic-bezier(.77,0,.18,1);z-index:-1}
#btn:hover::after{transform:scaleX(1);transform-origin:left}
#btn:hover::before{transform:translate(0,0)}
#btn:hover{transform:translate(-3px,-3px)}
#btn:active{transform:translate(2px,2px) scale(.98)}
#rw{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.rip{position:absolute;border-radius:50%;background:rgba(255,255,255,.15);transform:scale(0);animation:ripple .6s linear}
#counter{margin-top:2rem;font-weight:300;font-size:.7rem;letter-spacing:.3em;color:rgba(240,236,226,.25);text-transform:uppercase;min-height:1.2em;transition:color .3s}
#counter.flash{color:rgba(200,57,43,.7)}
/* boom */
#boom{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:50}
#boom span{font-family:'Bebas Neue',sans-serif;font-size:clamp(8rem,35vw,30rem);color:var(--accent);opacity:0;letter-spacing:-.04em}
#boom.active span{animation:boomAnim .7s cubic-bezier(.22,1,.36,1) forwards}
/* kid */
#kw{position:fixed;inset:0;display:flex;align-items:flex-end;justify-content:center;pointer-events:none;z-index:60}
#kid{width:min(380px,80vw);opacity:0;transform:translateY(60px) scale(.85);filter:drop-shadow(0 -8px 40px rgba(200,57,43,.35));transition:opacity .3s ease-in,transform .3s ease-in}
#kid.show{opacity:1;transform:translateY(0) scale(1);transition:opacity .38s cubic-bezier(.22,1,.36,1),transform .38s cubic-bezier(.22,1,.36,1)}
#arm-l{transform-origin:220px 310px}
#arm-r{transform-origin:280px 310px}
#kid.show #arm-l{animation:pumpL .38s ease-out .15s 3 alternate both}
#kid.show #arm-r{animation:pumpR .38s ease-out .15s 3 alternate both}
/* modal */
#lbm{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s,background .25s,backdrop-filter .25s}
#lbm.open{opacity:1;pointer-events:all;background:rgba(0,0,0,.78);backdrop-filter:blur(6px)}
#lbp{background:#111;border:1px solid rgba(200,57,43,.3);width:min(480px,92vw);max-height:80vh;overflow-y:auto;transform:translateY(24px) scale(.97);transition:transform .28s cubic-bezier(.22,1,.36,1)}
#lbm.open #lbp{transform:translateY(0) scale(1)}
.lbh{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 1.5rem 1rem;border-bottom:1px solid rgba(200,57,43,.18)}
.lbt{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.04em;color:var(--ink)}
#lbc{background:none;border:none;color:rgba(240,236,226,.4);font-size:1.4rem;cursor:pointer;padding:.2rem .4rem;line-height:1;transition:color .15s}
#lbc:hover{color:var(--ink)}
.lbnr{display:flex;align-items:center;gap:.6rem;padding:.8rem 1.5rem;border-bottom:1px solid rgba(255,255,255,.06)}
.lbnl{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(240,236,226,.35);white-space:nowrap}
#lbni{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(200,57,43,.25);color:var(--ink);font-family:'Rubik',sans-serif;font-size:.85rem;padding:.4rem .7rem;outline:none;transition:border-color .15s}
#lbni:focus{border-color:var(--accent)}
#lbns{background:var(--accent);border:none;color:white;font-family:'Rubik',sans-serif;font-size:.75rem;padding:.4rem .9rem;cursor:pointer;white-space:nowrap;transition:background .15s}
#lbns:hover{background:#a02820}
#lbs{padding:.8rem 1.5rem;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(240,236,226,.3);text-align:center}
#lbtbl{width:100%;border-collapse:collapse}
#lbtbl thead th{font-size:.58rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(240,236,226,.28);padding:.7rem 1.5rem;text-align:right;border-bottom:1px solid rgba(255,255,255,.05);font-weight:300}
#lbtbl thead th:last-child{text-align:left}
.lr td{padding:.8rem 1.5rem;border-bottom:1px solid rgba(255,255,255,.04);font-size:.88rem}
.lr.me td{background:rgba(200,57,43,.08)}
.lrk{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:rgba(240,236,226,.25);width:2.5rem}
.lrk.g{color:#f5c842}.lrk.s{color:#b0b8c4}.lrk.b{color:#cd7f4a}
.lav{width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:.75rem;margin-left:.6rem;vertical-align:middle;flex-shrink:0}
.lnc{display:flex;align-items:center}
.lmb{font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);border:1px solid rgba(200,57,43,.4);padding:.15rem .4rem;margin-right:.5rem}
.lsc{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;text-align:left;color:var(--ink)}
.lsc.top{color:#f5c842}
.lbf{padding:.8rem 1.5rem;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(240,236,226,.15);text-align:center;border-top:1px solid rgba(255,255,255,.04)}
/* live dot */
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#3a3;margin-left:6px;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes ripple{to{transform:scale(4);opacity:0}}
@keyframes boomAnim{0%{opacity:0;transform:scale(.4)}40%{opacity:.7;transform:scale(1.08)}70%{opacity:.5;transform:scale(.97)}100%{opacity:0;transform:scale(1.2)}}
@keyframes newBest{0%{transform:scale(1)}40%{transform:scale(1.5);color:#ff6b5b}100%{transform:scale(1);color:var(--accent)}}
@keyframes pumpL{from{transform:rotate(0)}to{transform:rotate(-18deg)}}
@keyframes pumpR{from{transform:rotate(0)}to{transform:rotate(18deg)}}
</style>
</head>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, onValue, query, orderByChild, limitToLast }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ─── Firebase config (public demo project — free tier) ───────────────────────
const app = initializeApp({
  apiKey: "AIzaSyBYeauMCj4ktv3G3H7VjyCWKioF0bGjWEs",
  authDomain: "sixseven-69921.firebaseapp.com",
  databaseURL: "https://sixseven-69921-default-rtdb.firebaseio.com",
  projectId: "sixseven-69921",
  storageBucket: "sixseven-69921.firebasestorage.app",
  messagingSenderId: "107190259661",
  appId: "1:107190259661:web:bd4d4ccf289e7013203e84",
  measurementId: "G-C1EZGMD0JB"
});
const db = getDatabase(app);

// ─── helpers ────────────────────────────────────────────────────────────────
const COLS=[['#1a3a5c','#7ec8f4'],['#2a1a3c','#c4a0f0'],['#1a3020','#70c888'],['#3a2010','#f0a860'],['#3a1a1a','#f07070'],['#1a2a3a','#70b8e0'],['#2a2a1a','#d0c860'],['#2a1a2a','#e080c0'],['#1a2a20','#80d0a0']];
function cfi(id){let h=0;for(let i=0;i<id.length;i++)h=(h*31+id.charCodeAt(i))%COLS.length;return COLS[h]}
function ini(n){if(!n)return'??';const p=n.trim().split(/\s+/);return p.length>=2?p[0][0]+p[1][0]:n.slice(0,2)}

// ─── identity ────────────────────────────────────────────────────────────────
let myId = localStorage.getItem('uid67');
if(!myId){myId=Math.random().toString(36).slice(2,10)+Date.now().toString(36);localStorage.setItem('uid67',myId)}
let myName = localStorage.getItem('name67')||'שחקן אנונימי';
let best = parseInt(localStorage.getItem('best67')||'0');
let clicks = 0;

document.getElementById('best-score').textContent = best;
document.getElementById('lbni').value = myName==='שחקן אנונימי' ? '' : myName;

// ─── save to Firebase ────────────────────────────────────────────────────────
function saveMe(){
  set(ref(db, 'players/'+myId), { name: myName, best, ts: Date.now() }).catch(()=>{});
}
saveMe();

// ─── leaderboard live listener ────────────────────────────────────────────────
const lbs  = document.getElementById('lbs');
const lbtbl= document.getElementById('lbtbl');
const lbb  = document.getElementById('lbb');
const M    = ['🥇','🥈','🥉'];

function renderRows(entries){
  if(!entries.length){lbs.textContent='אף אחד עוד לא שיחק — היה ראשון!';lbs.style.display='block';lbtbl.style.display='none';return}
  lbs.style.display='none';lbtbl.style.display='table';lbb.innerHTML='';
  entries.forEach((u,i)=>{
    const rk=i+1,isMe=u.id===myId;
    const [bg,fg]=isMe?['#3a0a0a','#f07070']:cfi(u.id);
    const av=ini(u.name);
    const rc=rk===1?'g':rk===2?'s':rk===3?'b':'';
    const tr=document.createElement('tr');
    tr.className='lr'+(isMe?' me':'');
    tr.innerHTML=`<td class="lrk ${rc}">${rk<=3?M[rk-1]:rk}</td><td><div class="lnc"><span class="lav" style="background:${bg};color:${fg}">${av}</span><span>${u.name}</span>${isMe?'<span class="lmb">אתה</span>':''}</div></td><td class="lsc${rk===1?' top':''}">${u.best}</td>`;
    lbb.appendChild(tr);
  });
}

// attach realtime listener once
const playersRef = query(ref(db,'players'), orderByChild('best'), limitToLast(50));
onValue(playersRef, snap=>{
  const raw=[];
  snap.forEach(child=>{ raw.push({id:child.key,...child.val()}) });
  raw.sort((a,b)=>b.best-a.best);
  renderRows(raw);
}, err=>{ lbs.textContent='שגיאת חיבור — נסה שוב'; lbs.style.display='block'; });

// ─── modal open/close ────────────────────────────────────────────────────────
const modal=document.getElementById('lbm');
document.getElementById('lb-btn').addEventListener('click',()=>modal.classList.add('open'));
document.getElementById('lbc').addEventListener('click',()=>modal.classList.remove('open'));
modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.remove('open')});

// ─── save name ───────────────────────────────────────────────────────────────
document.getElementById('lbns').addEventListener('click',()=>{
  const v=document.getElementById('lbni').value.trim();
  myName=v||'שחקן אנונימי';
  localStorage.setItem('name67',myName);
  saveMe();
  const s=document.getElementById('lbns');s.textContent='✓ נשמר';setTimeout(()=>s.textContent='שמור',1400);
});

// ─── game logic ───────────────────────────────────────────────────────────────
const btn=document.getElementById('btn'),ctr=document.getElementById('counter'),
      boom=document.getElementById('boom'),mse=document.getElementById('my-score'),
      bse=document.getElementById('best-score'),kid=document.getElementById('kid'),
      rw=document.getElementById('rw');
let kt=null;
const MSGS=['נלחץ!','עוד פעם?','אתה בטוח?','יאללה...','כן, שוב','👊','זה לא ישתנה','שישים ושבע.','6️⃣7️⃣','אוקי, מספיק'];

btn.addEventListener('click',e=>{
  const btnNum=document.getElementById('btn-num');
  if(btnNum.textContent.trim()!=='67') return;

  clicks++;
  mse.textContent=clicks;
  mse.style.transform='scale(1.35)';mse.style.color='#fff';
  setTimeout(()=>{mse.style.transform='scale(1)';mse.style.color='var(--ink)'},200);

  if(clicks>best){
    best=clicks;
    localStorage.setItem('best67',best);
    bse.textContent=best;
    bse.style.animation='none';void bse.offsetWidth;bse.style.animation='newBest .4s ease';
    saveMe();
  }

  kid.classList.remove('show');void kid.offsetWidth;kid.classList.add('show');
  clearTimeout(kt);kt=setTimeout(()=>kid.classList.remove('show'),1680);

  const r=document.createElement('span');r.className='rip';
  const rc=btn.getBoundingClientRect(),sz=Math.max(rc.width,rc.height)*1.5;
  r.style.cssText=`width:${sz}px;height:${sz}px;left:${e.clientX-rc.left-sz/2}px;top:${e.clientY-rc.top-sz/2}px`;
  rw.appendChild(r);setTimeout(()=>r.remove(),700);

  ctr.textContent=`${clicks}× — ${MSGS[Math.min(clicks-1,MSGS.length-1)]}`;
  ctr.classList.add('flash');setTimeout(()=>ctr.classList.remove('flash'),400);

  if(clicks%5===0){boom.classList.remove('active');void boom.offsetWidth;boom.classList.add('active');setTimeout(()=>boom.classList.remove('active'),750)}
});

// ─── button number cycling ────────────────────────────────────────────────────
(function(){
  const btnNum = document.getElementById('btn-num');
  let stepsSince67 = 0;
  const MIN_INTERVAL = 10, MAX_INTERVAL = 15;
  let nextAppearAt = MIN_INTERVAL + Math.floor(Math.random()*(MAX_INTERVAL-MIN_INTERVAL+1));

  function nextNumber(){
    stepsSince67++;
    let n;
    if(stepsSince67 >= nextAppearAt){
      n = 67;
      stepsSince67 = 0;
      nextAppearAt = MIN_INTERVAL + Math.floor(Math.random()*(MAX_INTERVAL-MIN_INTERVAL+1));
    } else {
      do { n = 1 + Math.floor(Math.random()*100); } while(n === 67);
    }
    btnNum.textContent = n;
  }

  // start immediately with a random number, then change every second
  nextNumber();
  setInterval(nextNumber, 1000);
})();
</script>
